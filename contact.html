<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jakub Tatár - Kontakt</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1 class="Header-Name">Jakub Tatár</h1>
        <div class="Header-Buttons">
            <a href="index.html">
                <button class="Header-Btn">Domov</button>
            </a>
            <a href="aboutMe.html">
                <button class="Header-Btn">O mne</button>
            </a>
            <a href="portfolio.html">
                <button class="Header-Btn">Portfólio</button>
            </a>
            <a href="blog.html">
                <button class="Header-Btn">Blog</button>
            </a>
            <a href="contact.html">
                <button class="Header-Btn" style="color: #5d84da">Kontakt</button>
            </a>
        </div>
    </header>

    <div class="Contact-Main">
        <div class="Contact-Main-Section1">
            <div class="Contact-Main-Title">
                <h1 class="Contact-Main-Text">Napíš mi!</h1>
                <h2 class="Contact-Main-Text" style="color: #5d84da; font-size: clamp(1rem, 5vw, 2rem);">Pošli správu alebo ma kontaktuj priamo</h2>
            </div>

            <div class="Contact-Form-Container">
                <form class="Contact-Form">
                    <input type="text" class="Contact-Input" placeholder="Meno">
                    <input type="email" class="Contact-Input" placeholder="E-mail">
                    <textarea class="Contact-Input Contact-Textarea" placeholder="Tvoja správa"></textarea>
                    <button type="submit" class="Contact-Main-Btn" style="border-color: #5d84da; background-color: #5d84da; color: #1e2638;">Odoslať správu</button>
                </form>
            </div>
        </div>

        <div class="Contact-Main-Section2">
            <div class="Contact-Info-Box">
                <h3 class="Contact-Main-Text" style="font-size: clamp(1rem, 5vw, 2rem);">Priamy kontakt</h3>
                <p class="Contact-Main-Text" style="font-size: clamp(1rem, 5vw, 1.5rem); color: var(--text-accent-color);">Telefón: +421 940 514 871</p>
                <p class="Contact-Main-Text" style="font-size: clamp(1rem, 5vw, 1.5rem); color: var(--text-accent-color);">E-mail: jakub.tatar4@gmail.com</p>
                <p class="Contact-Main-Text" style="font-size: clamp(1rem, 5vw, 1.5rem); color: var(--text-accent-color);">Lokalita: Slovensko</p>
            </div>
        </div>
    </div>

    <div class="Divider"></div>
    
    <footer>
        <div class="Footer-Links">
            <a href="https://www.facebook.com/">
                <img class="Footer-Img" src="Resources/FB.png">
            </a>
            <a href="https://www.instagram.com/">
                <img class="Footer-Img" src="Resources/IG.png">
            </a>
            <a href="https://sk.linkedin.com">
                <img class="Footer-Img" src="Resources/LI.png">
            </a>
            <a href="https://github.com/jakubtatar">
                <img class="Footer-Img" src="Resources/GH.png">
            </a>  
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
